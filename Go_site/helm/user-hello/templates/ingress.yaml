{{- if and .Values.ingress.enabled .Values.ingress.host (ne .Values.serviceKind "worker") }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.username }}-{{ .Values.name }}
  labels: 
    app: {{ .Values.username }}-{{ .Values.name }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | default "traefik" }}
spec:
  ingressClassName: {{ .Values.ingress.className | default "traefik" }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ .Values.ingress.path | default "/" }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.username }}-{{ .Values.name }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}