apiVersion: v1 
kind: Service
metadata: 
  name: hello-{{ .Values.username }}
  namespace: {{ .Values.username }}
  labels:
    app: hello-{{ .Values.username }}
  annotations: 
    metallb.io/address-pool: {{ .Values.metallb.addressPool | quote }}  
spec: 
  type: LoadBalancer 
  selector: 
    app: hello-{{ .Values.username }}
  ports: 
    - name: http 
      port: 80
      targetPort: 80
